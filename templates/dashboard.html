{% extends 'base.html' %}
{% block content %}

<h2 class="mb-4">Premium Dashboard</h2>

<div class="row">

    <div class="col-md-3">
        <div class="card-box gradient1">
            <h2>{{ total }}</h2>
            <p>Total Students</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card-box gradient2">
            <h2>{{ avg }}</h2>
            <p>Class Average</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card-box gradient3">
            <h2>{{ highest }}</h2>
            <p>Highest Marks</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card-box gradient4">
            <h2>{{ lowest }}</h2>
            <p>Lowest Marks</p>
        </div>
    </div>

</div>

{% endblock %}
