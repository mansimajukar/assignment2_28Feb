{% extends 'base.html' %}
{% block content %}

<h2>Add Student</h2>

<form method="POST" class="card p-4">

    <input type="text" name="name" class="form-control mb-2" placeholder="Name" required>
    <input type="text" name="roll" class="form-control mb-2" placeholder="Roll Number" required>

    <h5>Enter 5 Subject Marks</h5>

    <input type="number" name="mark1" class="form-control mb-2" required>
    <input type="number" name="mark2" class="form-control mb-2" required>
    <input type="number" name="mark3" class="form-control mb-2" required>
    <input type="number" name="mark4" class="form-control mb-2" required>
    <input type="number" name="mark5" class="form-control mb-3" required>

    <button class="btn btn-success">Add Student</button>

</form>

{% endblock %}
