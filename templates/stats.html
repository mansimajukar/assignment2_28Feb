{% extends 'base.html' %}
{% block content %}

<h2>Student Performance Graph</h2>

{% if names != "[]" %}
<canvas id="myChart"></canvas>
{% else %}
<p>No data available.</p>
{% endif %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const names = JSON.parse('{{ names | safe }}');
const totals = JSON.parse('{{ totals | safe }}');

if (names.length > 0) {
    const ctx = document.getElementById('myChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: names,
            datasets: [{
                label: 'Total Marks',
                data: totals,
                backgroundColor: 'rgba(54, 162, 235, 0.6)'
            }]
        },
        options: {
            responsive: true
        }
    });
}
</script>

{% endblock %}
