<!DOCTYPE html>
<html>
<head>
    <title>Premium Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
        }

        .sidebar {
            height: 100vh;
            background: rgba(0,0,0,0.7);
            padding-top: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #6c63ff;
            border-radius: 8px;
        }

        .card-box {
            border-radius: 15px;
            padding: 25px;
            color: white;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .gradient1 { background: linear-gradient(45deg, #00c6ff, #0072ff); }
        .gradient2 { background: linear-gradient(45deg, #11998e, #38ef7d); }
        .gradient3 { background: linear-gradient(45deg, #f7971e, #ffd200); }
        .gradient4 { background: linear-gradient(45deg, #ff416c, #ff4b2b); }

        .profile {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile img {
            width: 80px;
            border-radius: 50%;
        }

        .dark-mode {
            background: #121212 !important;
        }
    </style>
</head>

<body id="body">

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
        <div class="profile">
    <h5 class="text-white text-center mt-3">Admin Panel</h5>
</div>

        <a href="/dashboard"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/add"><i class="fa fa-user-plus"></i> Add Student</a>
        <a href="/view"><i class="fa fa-table"></i> View Students</a>
        <a href="/logout" class="text-danger"><i class="fa fa-sign-out-alt"></i> Logout</a>

        <button onclick="toggleDark()" class="btn btn-sm btn-light mt-3 w-100">
            🌙 Toggle Dark Mode
        </button>
    </div>

    <!-- Content -->
    <div class="col-md-10 p-4">
        {% block content %}{% endblock %}
    </div>

</div>
</div>

<script>
function toggleDark(){
    document.getElementById("body").classList.toggle("dark-mode");
}
</script>

</body>
</html>
